[build]
  command = "npm run build"
  publish = "frontend/dist"

# ── Security Headers ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://risecredit-api.onrender.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "cross-origin"

# Forward all /api requests to the live Render backend
[[redirects]]
  from = "/api/*"
  to = "https://risecredit-api.onrender.com/api/:splat"
  status = 200
  force = true

# Handle React Router (SPA) - all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
